name: Storage Ternary Pop Repro

on:
  push:
    branches: [compiler-e2e-repros]
    paths:
      - ".github/workflows/repro-storage-ternary-pop.yml"
      - "tests/tests/execution/repro_storage_ternary_pop_unselected.leo"

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
      CARGO_TERM_COLOR: always
      UPDATE_EXPECT: "1"
      TEST_NAME: execution_repro_storage_ternary_pop_unselected_leo
      EXPECTATION: tests/expectations/execution/repro_storage_ternary_pop_unselected.out
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev
      - run: cargo test -p leo-compiler --locked "$TEST_NAME" -- --exact --nocapture
      - run: cat "$EXPECTATION"
      - uses: actions/upload-artifact@v4
        with:
          name: storage-ternary-pop-output
          path: ${{ env.EXPECTATION }}
      - run: |
          grep -q "status: rejected" "$EXPECTATION"

