name: DCE Purity Repro

on:
  push:
    branches:
      - dce-purity-repro
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Reproduce DCE purity gaps
        run: bash scripts/repro-dce-purity.sh
