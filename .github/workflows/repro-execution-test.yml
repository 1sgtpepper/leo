name: Repro Execution Test

on:
  push:
    branches:
      - "upgrade/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run DCE finalize state repro
        run: cargo test --locked --profile ci -p leo-compiler execution_dce_subtraction_finalize_state_leo -- --nocapture
